                });
                return nearest;
            };
            
            const p1_proj = findNearestPoint(p1);
            const p2_proj = findNearestPoint(p2);
            const p3_proj = findNearestPoint(p3);
            
            if (p1_proj && p2_proj && p3_proj && sectionVertices.length > 10) {
                // 构建平面局部坐标系
                const planeY = axisVector('up');
                planeY.sub(planeNormal.clone().multiplyScalar(planeNormal.dot(planeY))).normalize();
                const planeZ = new THREE.Vector3();
                planeZ.crossVectors(planeNormal, planeY).normalize();
                
                // 将所有截面点转换到平面局部坐标系
                const localPoints = sectionVertices.map(v => {
                    const local = v.clone().sub(midPoint);
                    return {
                        x: planeY.dot(local),
                        y: planeZ.dot(local),
                        world: v
                    };
                });
                
                // 将三个标记点也转换到局部坐标系
                const p1_local = { x: planeY.dot(p1_proj.clone().sub(midPoint)), y: planeZ.dot(p1_proj.clone().sub(midPoint)) };
                const p2_local = { x: planeY.dot(p2_proj.clone().sub(midPoint)), y: planeZ.dot(p2_proj.clone().sub(midPoint)) };
                const p3_local = { x: planeY.dot(p3_proj.clone().sub(midPoint)), y: planeZ.dot(p3_proj.clone().sub(midPoint)) };
                
                // 按角度排序点
                const centerX = (p1_local.x + p2_local.x + p3_local.x) / 3;
                const centerY = (p1_local.y + p2_local.y + p3_local.y) / 3;
                
                localPoints.forEach(p => {
                    p.angle = Math.atan2(p.y - centerY, p.x - centerX);
                });
                
                p1_local.angle = Math.atan2(p1_local.y - centerY, p1_local.x - centerX);
                p2_local.angle = Math.atan2(p2_local.y - centerY, p2_local.x - centerX);
                p3_local.angle = Math.atan2(p3_local.y - centerY, p3_local.x - centerX);
                
                // 找到三个标记点在排序后的索引
                const sortedPoints = [...localPoints].sort((a, b) => a.angle - b.angle);
                
                let idx1 = -1, idx2 = -1, idx3 = -1;
                let minDiff1 = Infinity, minDiff2 = Infinity, minDiff3 = Infinity;
                
                sortedPoints.forEach((p, i) => {
                    const diff1 = Math.abs(p.angle - p1_local.angle);
                    const diff2 = Math.abs(p.angle - p2_local.angle);
                    const diff3 = Math.abs(p.angle - p3_local.angle);
                    if (diff1 < minDiff1) { idx1 = i; minDiff1 = diff1; }
                    if (diff2 < minDiff2) { idx2 = i; minDiff2 = diff2; }
                    if (diff3 < minDiff3) { idx3 = i; minDiff3 = diff3; }
                });
                
                // 根据角度顺序计算路径长度
                if (idx1 !== -1 && idx2 !== -1 && idx3 !== -1) {
                    const indices = [idx1, idx2, idx3].sort((a, b) => a - b);
                    
                    // 提取路径点（沿着截面轮廓，保留原始采样点）
                    const pathPoints = [];
                    for (let i = indices[0]; i <= indices[2]; i++) {
                        pathPoints.push(sortedPoints[i].world.clone());
                    }
                    const circularPath = (start, end) => {
                        const path = [];
                        let i = start;
                        while (true) {
                            path.push(i);
                            if (i === end) break;
                            i = (i + 1) % sortedPoints.length;
                        }
                        return path;
                    };
                    const forward = circularPath(idx1, idx3);
                    const backward = circularPath(idx3, idx1);
                    const chosenPath = forward.includes(idx2) ? forward : backward;
                    pathPoints.length = 0;
                    chosenPath.forEach(i => pathPoints.push(sortedPoints[i].world.clone()));
                    
                    // 使用高密度采样的Catmull-Rom样条插值，减少过度平滑
                    // 保留原始轮廓形状，只做适度插值
                    const interpolatedPoints = [];
                    const maxT = pathPoints.length - 1;
                    const highDensitySamples = 200;
                    
                    for (let i = 0; i < highDensitySamples; i++) {
                        const t = (i / (highDensitySamples - 1)) * maxT;
                        interpolatedPoints.push(catmullRomSpline(pathPoints, t));
                    }
                    
                    // 计算弧长
                    let length = 0;
                    for (let i = 0; i < interpolatedPoints.length - 1; i++) {
                        length += interpolatedPoints[i].distanceTo(interpolatedPoints[i + 1]);
                    }
                    return length;
                }
            }
            
            // 回退到贝塞尔曲线计算
            let length = 0;
            const numSegments = 50;
            for (let i = 0; i < numSegments; i++) {
                const t1 = i / numSegments;
                const t2 = (i + 1) / numSegments;
                const q1 = quadraticBezier(p1, p2, p3, t1);
                const q2 = quadraticBezier(p1, p2, p3, t2);
                length += q1.distanceTo(q2);
            }
            return length;
        }

        function catmullRomSpline(points, t) {
            const n = points.length;
            if (n < 2) return points[0] || new THREE.Vector3();
            
            const p0 = points[Math.max(0, Math.floor(t) - 1)];
            const p1 = points[Math.min(n - 1, Math.max(0, Math.floor(t)))];
            const p2 = points[Math.min(n - 1, Math.floor(t) + 1)];
            const p3 = points[Math.min(n - 1, Math.floor(t) + 2)];
            
            const localT = t - Math.floor(t);
            const t2 = localT * localT;
            const t3 = t2 * localT;
            
            const x = 0.5 * ((2 * p1.x) +
                (-p0.x + p2.x) * localT +
                (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
                (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3);
            
            const y = 0.5 * ((2 * p1.y) +
                (-p0.y + p2.y) * localT +
                (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
                (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3);
            
            const z = 0.5 * ((2 * p1.z) +
                (-p0.z + p2.z) * localT +
                (2 * p0.z - 5 * p1.z + 4 * p2.z - p3.z) * t2 +
                (-p0.z + 3 * p1.z - 3 * p2.z + p3.z) * t3);
            
            return new THREE.Vector3(x, y, z);
        }
        
        function smoothCurve(points, numSamples = 100, iterations = 0, focusRegion = false) {
            if (points.length < 2) return points;
            
            let smoothed = [];
            const maxT = points.length - 1;
            
            if (focusRegion && points.length >= 3) {
                // 在头顶与耳屏之间增加采样密度（针对头横维）
                // 假设中间点是头顶，两端是耳屏
                const midIndex = Math.floor(points.length / 2);
                const totalSegments = numSamples;
                
                // 前段（起点到顶点）和后段（顶点到终点）各占一半，但顶点附近更密集
                const halfSamples = Math.floor(totalSegments / 2);
                
                // 前段：起点到顶点，使用非线性采样，顶点附近更密集
                for (let i = 0; i <= halfSamples; i++) {
                    const t = Math.pow(i / halfSamples, 0.5);  // 平方根分布，靠近顶点更密集
                    const actualT = t * midIndex;
                    smoothed.push(catmullRomSpline(points, actualT));
                }
                
                // 后段：顶点到终点，同样使用非线性采样
                for (let i = 1; i <= halfSamples; i++) {
                    const t = Math.pow(i / halfSamples, 0.5);
                    const actualT = midIndex + t * (maxT - midIndex);
                    smoothed.push(catmullRomSpline(points, actualT));
                }
            } else {
                // 均匀采样
                for (let i = 0; i < numSamples; i++) {
                    const t = (i / (numSamples - 1)) * maxT;
                    smoothed.push(catmullRomSpline(points, t));
                }
            }
            
            // 额外的平滑迭代 - 移动平均滤波
            for (let iter = 0; iter < iterations; iter++) {
                const temp = [...smoothed];
                const kernelSize = 5;
                for (let i = 0; i < smoothed.length; i++) {
                    let sumX = 0, sumY = 0, sumZ = 0;
                    let count = 0;
                    for (let k = -kernelSize; k <= kernelSize; k++) {
                        const idx = i + k;
                        if (idx >= 0 && idx < smoothed.length) {
                            sumX += smoothed[idx].x;
                            sumY += smoothed[idx].y;
                            sumZ += smoothed[idx].z;
                            count++;
                        }
                    }
                    temp[i] = new THREE.Vector3(sumX / count, sumY / count, sumZ / count);
                }
                smoothed = temp;
            }
            
            return smoothed;
        }

        function quadraticBezier(p0, p1, p2, t) {
            const mt = 1 - t;
            return new THREE.Vector3(
                mt * mt * p0.x + 2 * mt * t * p1.x + t * t * p2.x,
                mt * mt * p0.y + 2 * mt * t * p1.y + t * t * p2.y,
                mt * mt * p0.z + 2 * mt * t * p1.z + t * t * p2.z
            );
        }

        function displayCircumferenceSection2(eyebrowCenter, occipital, planeNormal, planeY, planeZ, midPoint, sectionVertices, hull) {
            // 移除之前的截面可视化
            measurementGroup.children = measurementGroup.children.filter(child => 
                child.name !== 'circumferencePlane' && 
                child.name !== 'circumferenceHull' &&
                child.name !== 'circumferencePoints'
            );
            
            // 显示截面平面
            const planeGeo = new THREE.PlaneGeometry(size.x * 1.5, size.y * 1.5);
            const planeMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xff6600, 
                transparent: true, 
                opacity: 0.3,
                side: THREE.DoubleSide 
            });
            const plane = new THREE.Mesh(planeGeo, planeMaterial);
            plane.position.copy(midPoint);
            
            // 旋转平面使其法向量与 planeNormal 一致
            const lookAt = new THREE.Vector3();
            lookAt.copy(midPoint).add(planeNormal);
            plane.lookAt(lookAt);
            
            plane.name = 'circumferencePlane';
            measurementGroup.add(plane);
            
            // 显示截面点（采样显示）- 投影到平面上
            if (sectionVertices.length > 0) {
                const pointGeo = new THREE.BufferGeometry();
                const pointPositions = [];
                const step = Math.max(1, Math.floor(sectionVertices.length / 50));
                for (let i = 0; i < sectionVertices.length; i += step) {
                    const p = sectionVertices[i];
                    // 将点投影到平面上
                    const local = p.clone().sub(midPoint);
                    const dist = planeNormal.dot(local);
                    const projected = p.clone().sub(planeNormal.clone().multiplyScalar(dist));
                    pointPositions.push(projected.x, projected.y, projected.z);
                }
                pointGeo.setAttribute('position', new THREE.Float32BufferAttribute(pointPositions, 3));
                const pointsMaterial = new THREE.PointsMaterial({ color: 0xffff00, size: 3 });
                const points = new THREE.Points(pointGeo, pointsMaterial);
                points.name = 'circumferencePoints';
                measurementGroup.add(points);
            }
            
            // 显示凸包轮廓 - 投影到平面上
            if (hull && hull.length > 2) {
                const hullPoints = [];
                hull.forEach(p => {
                    // 将凸包点从局部坐标转换回世界坐标
                    const worldPoint = midPoint.clone()
                        .add(planeY.clone().multiplyScalar(p.x))
                        .add(planeZ.clone().multiplyScalar(p.y));
                    hullPoints.push(worldPoint);
                });
                hullPoints.push(hullPoints[0].clone()); // 闭合
                
                const hullGeo = new THREE.BufferGeometry().setFromPoints(hullPoints);
                const hullMaterial = new THREE.LineBasicMaterial({ color: 0xff0000, linewidth: 3 });
                const hullLine = new THREE.Line(hullGeo, hullMaterial);
                hullLine.name = 'circumferenceHull';
                measurementGroup.add(hullLine);
            }
        }

        function updateMeasurements() {
            if (!box || !center || !size || !mesh) return;
            
            let vertices = [];
            mesh.traverse((child) => {
                if (child.isMesh && child.geometry) {
                    const positions = child.geometry.attributes.position;
                    for (let i = 0; i < positions.count; i++) {
                        const p = new THREE.Vector3();
                        p.fromBufferAttribute(positions, i);
                        child.localToWorld(p);
                        vertices.push(p);
                    }
                }
            });

            if (markedPoints.eyebrowCenter && markedPoints.occipital) {
                // 计算以 X 方向为轴，且过眉心和枕后点的平面
                // 平面法向量 = X 轴 × (枕后点 - 眉心) 向量
                const planeNormal = new THREE.Vector3();
                planeNormal.subVectors(markedPoints.occipital, markedPoints.eyebrowCenter);
                
                // X 轴方向向量
                const xAxis = axisVector('lr');
                
                // 计算平面法向量：X 轴 × 眉心 - 枕后点向量
                planeNormal.crossVectors(xAxis, planeNormal).normalize();
                
                // 在该平面附近截取截面点（距离平面在 tolerance 范围内）
                const tolerance = size.x * 0.03;
                const sectionVertices = vertices.filter(v => {
                    const dist = Math.abs(planeNormal.dot(v.clone().sub(markedPoints.eyebrowCenter)));
                    return dist < tolerance;
                });
                
                if (sectionVertices.length > 10) {
                    // 将点投影到过眉心和枕后点的平面上
                    const midPoint = new THREE.Vector3();
                    midPoint.addVectors(markedPoints.eyebrowCenter, markedPoints.occipital).multiplyScalar(0.5);
                    
                    // 构建平面局部坐标系
                    // Y 轴：世界 Y 轴投影到平面上
                    const planeY = axisVector('up');
                    planeY.sub(planeNormal.clone().multiplyScalar(planeNormal.dot(planeY))).normalize();
                    
                    // Z 轴：平面法向量 × 平面 Y 轴
                    const planeZ = new THREE.Vector3();
                    planeZ.crossVectors(planeNormal, planeY).normalize();
                    
                    const points2D = sectionVertices.map(p => {
                        const local = p.clone().sub(midPoint);
                        return {
                            x: planeY.dot(local),  // Y 方向坐标
                            y: planeZ.dot(local)   // Z 方向坐标
                        };
                    });
                    
                    const hull = convexHull(points2D);
                    
                    if (hull.length > 2) {
                        let circumference = 0;
                        for (let i = 0; i < hull.length; i++) {
                            const p1 = new THREE.Vector2(hull[i].x, hull[i].y);
                            const p2 = new THREE.Vector2(hull[(i + 1) % hull.length].x, hull[(i + 1) % hull.length].y);
                            circumference += p1.distanceTo(p2);
                        }
                        
                        // 应用单位转换系数
                        const scaleFactor = parseFloat(document.getElementById('scaleFactor').value);
                        document.getElementById('circumferenceValue').textContent = (circumference * scaleFactor).toFixed(2) + ' mm';
                    }
                    
                    // 显示截面可视化
                    displayCircumferenceSection2(markedPoints.eyebrowCenter, markedPoints.occipital, planeNormal, planeY, planeZ, midPoint, sectionVertices, hull);
                }
            }

            if (markedPoints.leftEar && markedPoints.rightEar) {
                const scaleFactor = parseFloat(document.getElementById('scaleFactor').value);
                const headWidth = Math.abs(axisValue(markedPoints.rightEar, 'lr') - axisValue(markedPoints.leftEar, 'lr')) * scaleFactor;
                document.getElementById('widthValue').textContent = headWidth.toFixed(2) + ' mm';
            }

            if (markedPoints.noseTip && markedPoints.occipital) {
                const scaleFactor = parseFloat(document.getElementById('scaleFactor').value);
                const headLength = Math.abs(axisValue(markedPoints.occipital, 'fb') - axisValue(markedPoints.noseTip, 'fb')) * scaleFactor;
                document.getElementById('lengthValue').textContent = headLength.toFixed(2) + ' mm';
            }

            if (markedPoints.headTop && markedPoints.chin) {
                const scaleFactor = parseFloat(document.getElementById('scaleFactor').value);
                const headHeight = Math.abs(axisValue(markedPoints.headTop, 'up') - axisValue(markedPoints.chin, 'up')) * scaleFactor;
                document.getElementById('heightValue').textContent = headHeight.toFixed(2) + ' mm';
            }

            if (markedPoints.headTop && markedPoints.leftEar && markedPoints.rightEar) {
                const scaleFactor = parseFloat(document.getElementById('scaleFactor').value);
                const earPlaneY = (axisValue(markedPoints.leftEar, 'up') + axisValue(markedPoints.rightEar, 'up')) / 2;
                const earHeight = Math.abs(axisValue(markedPoints.headTop, 'up') - earPlaneY) * scaleFactor;
                document.getElementById('earHeightValue').textContent = earHeight.toFixed(2) + ' mm';
            }

            if (markedPoints.leftEye && markedPoints.rightEye) {
                const scaleFactor = parseFloat(document.getElementById('scaleFactor').value);
                const pupilDistance = markedPoints.leftEye.distanceTo(markedPoints.rightEye) * scaleFactor;
                document.getElementById('pupilDistanceValue').textContent = pupilDistance.toFixed(2) + ' mm';
            }

            if (markedPoints.noseRoot && markedPoints.leftEar) {
                const scaleFactor = parseFloat(document.getElementById('scaleFactor').value);
                const earNoseDistance = Math.abs(axisValue(markedPoints.leftEar, 'fb') - axisValue(markedPoints.noseRoot, 'fb')) * scaleFactor;
                document.getElementById('earNoseDistanceValue').textContent = earNoseDistance.toFixed(2) + ' mm';
            }

            if (markedPoints.leftEar && markedPoints.headTop && markedPoints.rightEar) {
                const scaleFactor = parseFloat(document.getElementById('scaleFactor').value);
                
                let earToHeadArc = calculateArcLength(markedPoints.leftEar, markedPoints.headTop, markedPoints.rightEar);
                const earChord = markedPoints.leftEar.distanceTo(markedPoints.rightEar);
                const crownRise = Math.max(
                    0,
                    axisValue(markedPoints.headTop, 'up') - (axisValue(markedPoints.leftEar, 'up') + axisValue(markedPoints.rightEar, 'up')) / 2
                );
                const a = earChord / 2;
                const b = Math.max(crownRise, a * 0.35);
                const ellipseArc = Math.PI * (3 * (a + b) - Math.sqrt((3 * a + b) * (a + 3 * b))) / 2;
                if (!Number.isFinite(earToHeadArc) || earToHeadArc > ellipseArc * 1.8) {
                    earToHeadArc = ellipseArc;
                }
                
                const transverseArc = earToHeadArc * scaleFactor;
                document.getElementById('transverseArcValue').textContent = transverseArc.toFixed(2) + ' mm';
                
                displayArcWithPlane('transverse', markedPoints.leftEar, markedPoints.headTop, markedPoints.rightEar, 0x00ff88);
            } else {
                // 移除弧线、截面、采样点、弧线点和直线
                measurementGroup.children = measurementGroup.children.filter(child => 
                    child.name !== 'transverseArc' && 
                    child.name !== 'transversePlane' &&
                    child.name !== 'transverseSectionPoints' &&
                    child.name !== 'transverseArcPoints' &&
                    child.name !== 'transverseLeftLine' &&
                    child.name !== 'transverseRightLine'
                );
            }

            if (markedPoints.eyebrowCenter && markedPoints.headTop && markedPoints.occipital) {
                const scaleFactor = parseFloat(document.getElementById('scaleFactor').value);
                const longitudinalArc = calculateArcLength(markedPoints.eyebrowCenter, markedPoints.headTop, markedPoints.occipital) * scaleFactor;
                document.getElementById('longitudinalArcValue').textContent = longitudinalArc.toFixed(2) + ' mm';
                // 显示头纵维弧线和截面
                displayArcWithPlane('longitudinal', markedPoints.eyebrowCenter, markedPoints.headTop, markedPoints.occipital, 0xff00ff);
            } else {
                // 移除弧线、截面、采样点和弧线点
                measurementGroup.children = measurementGroup.children.filter(child => 
                    child.name !== 'longitudinalArc' && 
                    child.name !== 'longitudinalPlane' &&
                    child.name !== 'longitudinalSectionPoints' &&
                    child.name !== 'longitudinalArcPoints'
                );
            }
        }

        function displayLine(name, p1, p2, color) {
            // 移除之前的直线
            measurementGroup.children = measurementGroup.children.filter(child => 
                child.name !== name
            );
            
            // 创建直线
            const lineGeo = new THREE.BufferGeometry().setFromPoints([p1, p2]);
            const lineMaterial = new THREE.LineBasicMaterial({ color: color, linewidth: 2, dashed: true });
            const line = new THREE.Line(lineGeo, lineMaterial);
            line.name = name;
            measurementGroup.add(line);
        }

        function displayArcWithPlane(name, p1, p2, p3, color) {
            // 移除之前的弧线、截面和采样点
            measurementGroup.children = measurementGroup.children.filter(child => 
                child.name !== name + 'Arc' && 
                child.name !== name + 'Plane' &&
                child.name !== name + 'SectionPoints' &&
                child.name !== name + 'ArcPoints'
            );
            
            // 计算三点确定的平面
            const v1 = new THREE.Vector3().subVectors(p2, p1);
            const v2 = new THREE.Vector3().subVectors(p3, p1);
            const planeNormal = new THREE.Vector3().crossVectors(v1, v2).normalize();
            
            // 计算平面中心点（三点的平均）
            const midPoint = new THREE.Vector3().addVectors(p1, p2).add(p3).multiplyScalar(1/3);
            
            // 获取模型顶点用于截面采样
            let vertices = [];
            mesh.traverse((child) => {
                if (child.isMesh && child.geometry) {
                    const positions = child.geometry.attributes.position;
                    for (let i = 0; i < positions.count; i++) {
                        const pv = new THREE.Vector3();
                        pv.fromBufferAttribute(positions, i);
                        child.localToWorld(pv);
                        vertices.push(pv);
                    }
                }
            });
            
            // 在该平面附近截取截面点并投影到平面上
            const tolerance = size.x * 0.03;
            const sectionVertices = [];
            vertices.forEach(v => {
                const dist = Math.abs(planeNormal.dot(v.clone().sub(midPoint)));
                if (dist < tolerance) {
                    // 投影到平面上
                    const local = v.clone().sub(midPoint);
                    const d = planeNormal.dot(local);
                    const projected = v.clone().sub(planeNormal.clone().multiplyScalar(d));
                    sectionVertices.push(projected);
                }
            });
            
            // 显示截面采样点
            if (sectionVertices.length > 10) {
                const pointPositions = [];
                const step = Math.max(1, Math.floor(sectionVertices.length / 50));
                for (let i = 0; i < sectionVertices.length; i += step) {
                    const p = sectionVertices[i];
                    pointPositions.push(p.x, p.y, p.z);
                }
                const pointGeo = new THREE.BufferGeometry();
                pointGeo.setAttribute('position', new THREE.Float32BufferAttribute(pointPositions, 3));
                const pointsMaterial = new THREE.PointsMaterial({ color: color, size: 2 });
                const points = new THREE.Points(pointGeo, pointsMaterial);
                points.name = name + 'SectionPoints';
                measurementGroup.add(points);
            }
            
            // 创建截面平面（仅用于显示参考）
            const planeSize = Math.max(size.x, size.y, size.z) * 1.2;
            const planeGeo = new THREE.PlaneGeometry(planeSize, planeSize);
            const planeMaterial = new THREE.MeshBasicMaterial({ 
                color: color, 
                transparent: true, 
                opacity: 0.15,
                side: THREE.DoubleSide 
            });
            const plane = new THREE.Mesh(planeGeo, planeMaterial);
            plane.position.copy(midPoint);
            
            // 旋转平面使其朝向正确
            const lookAt = new THREE.Vector3().copy(midPoint).add(planeNormal);
            plane.lookAt(lookAt);
            
            plane.name = name + 'Plane';
            measurementGroup.add(plane);
            
            // 在截面采样点中找到最接近三个标记点的点
            const findNearestPoint = (target) => {
                let nearest = null;
                let minDist = Infinity;
                sectionVertices.forEach(v => {
                    const dist = v.distanceTo(target);
                    if (dist < minDist) {
                        minDist = dist;
                        nearest = v;
                    }
                });
                return nearest;
            };
            
            const p1_proj = findNearestPoint(p1);
            const p2_proj = findNearestPoint(p2);
            const p3_proj = findNearestPoint(p3);
            
            if (p1_proj && p2_proj && p3_proj && sectionVertices.length > 10) {
                // 构建平面局部坐标系
                const planeY = axisVector('up');
                planeY.sub(planeNormal.clone().multiplyScalar(planeNormal.dot(planeY))).normalize();
                const planeZ = new THREE.Vector3();
                planeZ.crossVectors(planeNormal, planeY).normalize();
                
                // 将所有截面点转换到平面局部坐标系
                const localPoints = sectionVertices.map(v => {
                    const local = v.clone().sub(midPoint);
                    return {
                        x: planeY.dot(local),
                        y: planeZ.dot(local),
                        world: v
                    };
                });
                
                // 将三个标记点也转换到局部坐标系
                const p1_local = {
                    x: planeY.dot(p1_proj.clone().sub(midPoint)),
                    y: planeZ.dot(p1_proj.clone().sub(midPoint))
                };
                const p2_local = {
                    x: planeY.dot(p2_proj.clone().sub(midPoint)),
                    y: planeZ.dot(p2_proj.clone().sub(midPoint))
                };
                const p3_local = {
                    x: planeY.dot(p3_proj.clone().sub(midPoint)),
                    y: planeZ.dot(p3_proj.clone().sub(midPoint))
                };
                
                // 找到从p1到p2到p3的路径点（在截面采样点中）
                const arcPath = [];
                
                // 按角度排序点，找到从p1到p2到p3的路径
                const centerX = (p1_local.x + p2_local.x + p3_local.x) / 3;
                const centerY = (p1_local.y + p2_local.y + p3_local.y) / 3;
                
                // 计算每个点相对于中心的角度
                localPoints.forEach(p => {
                    p.angle = Math.atan2(p.y - centerY, p.x - centerX);
                });
                
                // 计算三个标记点的角度
                p1_local.angle = Math.atan2(p1_local.y - centerY, p1_local.x - centerX);
                p2_local.angle = Math.atan2(p2_local.y - centerY, p2_local.x - centerX);
                p3_local.angle = Math.atan2(p3_local.y - centerY, p3_local.x - centerX);
                
                // 找到从p1到p2到p3的路径
                const sortedPoints = [...localPoints].sort((a, b) => a.angle - b.angle);
                
                // 找到三个标记点在排序后的索引
                let idx1 = -1, idx2 = -1, idx3 = -1;
                let minDiff1 = Infinity, minDiff2 = Infinity, minDiff3 = Infinity;
                
                sortedPoints.forEach((p, i) => {
                    const diff1 = Math.abs(p.angle - p1_local.angle);
                    const diff2 = Math.abs(p.angle - p2_local.angle);
                    const diff3 = Math.abs(p.angle - p3_local.angle);
                    if (diff1 < minDiff1) { idx1 = i; minDiff1 = diff1; }
                    if (diff2 < minDiff2) { idx2 = i; minDiff2 = diff2; }
                    if (diff3 < minDiff3) { idx3 = i; minDiff3 = diff3; }
                });
                
                // 根据角度顺序确定路径方向
                if (idx1 !== -1 && idx2 !== -1 && idx3 !== -1) {
                    // 确定从p1到p2到p3的正确顺序
                    const indices = [idx1, idx2, idx3].sort((a, b) => a - b);
                    
                    // 沿排序后的点选取路径
                    for (let i = indices[0]; i <= indices[2]; i++) {
                        arcPath.push(sortedPoints[i].world.clone());
                    }
                    
                    // 如果点太少，使用二次贝塞尔曲线作为备选
                    if (arcPath.length < 5) {
                        arcPath.length = 0;
                        const numSegments = 30;
                        for (let i = 0; i <= numSegments; i++) {
                            const t = i / numSegments;
                            const point = quadraticBezier(p1_proj, p2_proj, p3_proj, t);
                            arcPath.push(point);
                        }
                    }
                } else {
                    // 回退到贝塞尔曲线
                    const numSegments = 30;
                    for (let i = 0; i <= numSegments; i++) {
                        const t = i / numSegments;
                        const point = quadraticBezier(p1_proj, p2_proj, p3_proj, t);
                        arcPath.push(point);
                    }
                }
                
                // 使用高密度Catmull-Rom插值，不做过度平滑，保持贴近轮廓
                const interpolatedArcPath = [];
                if (arcPath.length > 2) {
                    const maxT = arcPath.length - 1;
                    const highDensitySamples = 200;
                    for (let i = 0; i < highDensitySamples; i++) {
                        const t = (i / (highDensitySamples - 1)) * maxT;
                        interpolatedArcPath.push(catmullRomSpline(arcPath, t));
                    }
                } else {
                    interpolatedArcPath.push(...arcPath);
                }
                
                // 创建弧线（使用插值后的路径，贴近轮廓）
                const arcGeo = new THREE.BufferGeometry().setFromPoints(interpolatedArcPath);
                const arcMaterial = new THREE.LineBasicMaterial({ color: color, linewidth: 3 });
                const arcLine = new THREE.Line(arcGeo, arcMaterial);
                arcLine.name = name + 'Arc';
                measurementGroup.add(arcLine);
                
                // 在弧线上添加采样点（使用插值后的路径）
                const arcSamplePoints = [];
                const step = Math.max(1, Math.floor(interpolatedArcPath.length / 10));
                for (let i = 0; i < interpolatedArcPath.length; i += step) {
                    arcSamplePoints.push(interpolatedArcPath[i].x, interpolatedArcPath[i].y, interpolatedArcPath[i].z);
                }
                const arcPointGeo = new THREE.BufferGeometry();
                arcPointGeo.setAttribute('position', new THREE.Float32BufferAttribute(arcSamplePoints, 3));
                const arcPointMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 4 });
                const arcPointsObj = new THREE.Points(arcPointGeo, arcPointMaterial);
                arcPointsObj.name = name + 'ArcPoints';
                measurementGroup.add(arcPointsObj);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
        window.loadModel = loadModel;
        window.setMarkMode = setMarkMode;
        window.resetMarks = resetMarks;
        window.autoDetectPoints = autoDetectPoints;
    </script>
</body>
